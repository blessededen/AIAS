<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 음성 비서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a2e;
    --accent: #00d4aa;
    --accent-glow: rgba(0, 212, 170, 0.3);
    --accent-dim: rgba(0, 212, 170, 0.1);
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-dim: #555570;
    --border: rgba(255,255,255,0.06);
    --danger: #ff4466;
    --user-bubble: #1e2a3a;
    --ai-bubble: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Ambient Background ── */
  .ambient {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .ambient::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    top: -200px; right: -200px;
    background: radial-gradient(circle, rgba(0,212,170,0.04) 0%, transparent 70%);
    animation: drift 20s ease-in-out infinite;
  }
  .ambient::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    bottom: -150px; left: -150px;
    background: radial-gradient(circle, rgba(100,100,255,0.03) 0%, transparent 70%);
    animation: drift 25s ease-in-out infinite reverse;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, 30px) scale(1.1); }
  }

  /* ── Header ── */
  .header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .header-left {
    display: flex; align-items: center; gap: 14px;
  }
  .logo {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #0088ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .header-title h1 {
    font-size: 16px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header-title span {
    font-size: 11px; color: var(--text-dim);
    font-weight: 400;
  }
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--accent-dim);
    font-size: 11px; font-weight: 500;
    color: var(--accent);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Settings Panel ── */
  .settings-toggle {
    background: none; border: none; cursor: pointer;
    color: var(--text-secondary); font-size: 20px;
    padding: 6px;
    transition: color 0.2s;
  }
  .settings-toggle:hover { color: var(--accent); }

  .settings-panel {
    position: relative; z-index: 10;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s ease;
  }
  .settings-panel.open {
    max-height: 300px;
    padding: 16px 24px;
  }
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .setting-group label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .setting-group select,
  .setting-group input[type="text"] {
    width: 100%;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setting-group select:focus,
  .setting-group input:focus {
    border-color: var(--accent);
  }
  .setting-group input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }
  .range-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── Chat Area ── */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    position: relative; z-index: 5;
    scroll-behavior: smooth;
  }
  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb {
    background: var(--text-dim); border-radius: 4px;
  }

  .message {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    animation: msg-in 0.35s ease-out;
    max-width: 85%;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user {
    margin-left: auto;
    flex-direction: row-reverse;
  }
  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .message.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #0088ff);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .message.user .msg-avatar {
    background: #2a2a40;
  }
  .msg-content {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    position: relative;
  }
  .message.ai .msg-content {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .message.user .msg-content {
    background: var(--user-bubble);
    border: 1px solid rgba(0,136,255,0.15);
    border-bottom-right-radius: 4px;
  }
  .msg-time {
    font-size: 10px; color: var(--text-dim);
    margin-top: 4px;
  }

  /* Typing indicator */
  .typing-indicator {
    display: none;
    gap: 4px; padding: 8px 0;
    margin-bottom: 12px;
  }
  .typing-indicator.active { display: flex; align-items: center; gap: 12px; }
  .typing-dots { display: flex; gap: 4px; }
  .typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce-dot 1.4s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce-dot {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
  .typing-label { font-size: 12px; color: var(--text-dim); }

  /* ── Input Area ── */
  .input-area {
    position: relative; z-index: 10;
    padding: 16px 24px 20px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }

  /* Voice Visualizer */
  .voice-visualizer {
    display: none;
    align-items: center; justify-content: center;
    gap: 3px;
    height: 48px;
    margin-bottom: 12px;
  }
  .voice-visualizer.active { display: flex; }
  .viz-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 3px;
    animation: viz-pulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes viz-pulse {
    0% { height: 6px; opacity: 0.4; }
    100% { height: 36px; opacity: 1; }
  }

  .input-row {
    display: flex; align-items: center; gap: 10px;
  }
  .text-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--text-dim); }

  .btn {
    width: 46px; height: 46px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-mic {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-mic:hover { border-color: var(--accent); color: var(--accent); }
  .btn-mic.recording {
    background: rgba(255,68,102,0.15);
    border-color: var(--danger);
    color: var(--danger);
    animation: rec-pulse 1.2s ease-in-out infinite;
  }
  @keyframes rec-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,102,0.3); }
    50% { box-shadow: 0 0 0 8px rgba(255,68,102,0); }
  }
  .btn-send {
    background: linear-gradient(135deg, var(--accent), #0088ff);
    color: #fff;
  }
  .btn-send:hover { transform: scale(1.05); }
  .btn-send:disabled {
    opacity: 0.3; cursor: not-allowed;
    transform: none;
  }
  .btn-stop-speech {
    background: rgba(255,68,102,0.15);
    border: 1px solid var(--danger);
    color: var(--danger);
    display: none;
  }
  .btn-stop-speech.active { display: flex; }

  .input-hints {
    display: flex; gap: 16px;
    margin-top: 10px;
    justify-content: center;
  }
  .hint {
    font-size: 11px;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 4px;
  }
  .hint kbd {
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }

  /* ── Welcome Screen ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
    gap: 20px;
  }
  .welcome-icon {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--accent), #0088ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 0 40px var(--accent-glow);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .welcome h2 {
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .welcome p {
    font-size: 14px; color: var(--text-secondary);
    max-width: 400px; line-height: 1.6;
  }
  .quick-actions {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center; margin-top: 8px;
  }
  .quick-action {
    padding: 8px 16px;
    border-radius: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .quick-action:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* ── API Key Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    max-width: 440px; width: 100%;
    animation: modal-in 0.3s ease-out;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal h3 {
    font-size: 18px; margin-bottom: 8px;
  }
  .modal p {
    font-size: 13px; color: var(--text-secondary);
    margin-bottom: 20px; line-height: 1.6;
  }
  .modal input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    margin-bottom: 16px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #0088ff);
    color: #fff;
    font-family: inherit;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-btn:hover { opacity: 0.9; }
  .modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .modal-note {
    font-size: 11px; color: var(--text-dim);
    margin-top: 12px; text-align: center;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .chat-container { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
    .message { max-width: 92%; }
    .settings-grid { grid-template-columns: 1fr; }
    .welcome h2 { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="ambient"></div>

<!-- API Key Modal -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h3>🔑 API 키 설정</h3>
    <p>AI 비서를 사용하려면 Gemini API 키가 필요합니다. 키는 브라우저 세션에만 저장되며 외부로 전송되지 않습니다.</p>
    <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off">
    <button class="modal-btn" id="saveApiKey">시작하기</button>
    <div class="modal-note">API 키가 없으신가요? <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--accent)">Google AI Studio</a>에서 발급받으세요</div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">🤖</div>
    <div class="header-title">
      <h1>AI 음성 비서</h1>
      <span>Gemini 기반 · 음성 대화</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="status-badge">
      <div class="status-dot"></div>
      <span id="statusText">준비 완료</span>
    </div>
    <button class="settings-toggle" id="settingsBtn" title="설정">⚙️</button>
  </div>
</div>

<!-- Settings -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-grid">
    <div class="setting-group">
      <label>음성 선택</label>
      <select id="voiceSelect"></select>
    </div>
    <div class="setting-group">
      <label>인식 언어</label>
      <select id="langSelect">
        <option value="ko-KR" selected>한국어</option>
        <option value="en-US">English</option>
        <option value="ja-JP">日本語</option>
        <option value="zh-CN">中文</option>
      </select>
    </div>
    <div class="setting-group">
      <label>음성 속도</label>
      <input type="range" id="speechRate" min="0.5" max="2" step="0.1" value="1">
      <div class="range-label"><span>느림</span><span id="rateVal">1.0</span><span>빠름</span></div>
    </div>
    <div class="setting-group">
      <label>음성 높낮이</label>
      <input type="range" id="speechPitch" min="0.5" max="2" step="0.1" value="1">
      <div class="range-label"><span>낮음</span><span id="pitchVal">1.0</span><span>높음</span></div>
    </div>
  </div>
</div>

<!-- Chat -->
<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">🎙️</div>
    <h2>안녕하세요! 음성 AI 비서입니다</h2>
    <p>마이크 버튼을 누르고 말씀하시거나, 텍스트를 입력해 대화를 시작하세요. AI가 음성으로 답변해드립니다.</p>
    <div class="quick-actions">
      <button class="quick-action" onclick="sendQuick('오늘 날씨 어때?')">☀️ 오늘 날씨</button>
      <button class="quick-action" onclick="sendQuick('재미있는 이야기 해줘')">📖 이야기 해줘</button>
      <button class="quick-action" onclick="sendQuick('간단한 요리 레시피 추천해줘')">🍳 요리 추천</button>
      <button class="quick-action" onclick="sendQuick('영어 공부 도와줘')">📚 영어 공부</button>
    </div>
  </div>
  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
    <span class="typing-label">AI가 생각하고 있어요...</span>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="voice-visualizer" id="voiceVisualizer"></div>
  <div class="input-row">
    <button class="btn btn-mic" id="micBtn" title="음성 입력 (Space)">🎤</button>
    <input type="text" class="text-input" id="textInput" placeholder="메시지를 입력하세요..." autocomplete="off">
    <button class="btn btn-stop-speech" id="stopSpeechBtn" title="음성 중지">⏹️</button>
    <button class="btn btn-send" id="sendBtn" title="전송 (Enter)" disabled>➤</button>
  </div>
  <div class="input-hints">
    <span class="hint"><kbd>Enter</kbd> 전송</span>
    <span class="hint"><kbd>Space</kbd> 길게 눌러 음성 입력</span>
  </div>
</div>

<script>
// ── State ──
let API_KEY = '';
let conversationHistory = [];
let isRecording = false;
let isSpeaking = false;
let recognition = null;
let currentUtterance = null;

// ── Elements ──
const $ = id => document.getElementById(id);
const chatContainer = $('chatContainer');
const textInput = $('textInput');
const sendBtn = $('sendBtn');
const micBtn = $('micBtn');
const stopSpeechBtn = $('stopSpeechBtn');
const typingIndicator = $('typingIndicator');
const welcomeScreen = $('welcomeScreen');
const voiceVisualizer = $('voiceVisualizer');
const apiModal = $('apiModal');
const apiKeyInput = $('apiKeyInput');
const settingsPanel = $('settingsPanel');
const voiceSelect = $('voiceSelect');
const statusText = $('statusText');

// ── Init ──
window.addEventListener('load', () => {
  API_KEY = sessionStorage.getItem('gemini_key') || '';
  if (!API_KEY) {
    apiModal.classList.add('active');
  }
  initVoices();
  initVisualizer();
  initSpeechRecognition();
});

// Save API Key
$('saveApiKey').addEventListener('click', () => {
  const key = apiKeyInput.value.trim();
  if (key) {
    API_KEY = key;
    sessionStorage.setItem('gemini_key', key);
    apiModal.classList.remove('active');
  }
});
apiKeyInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') $('saveApiKey').click();
});

// Settings toggle
$('settingsBtn').addEventListener('click', () => {
  settingsPanel.classList.toggle('open');
});

// Rate & Pitch labels
$('speechRate').addEventListener('input', e => {
  $('rateVal').textContent = parseFloat(e.target.value).toFixed(1);
});
$('speechPitch').addEventListener('input', e => {
  $('pitchVal').textContent = parseFloat(e.target.value).toFixed(1);
});

// ── Voice Init ──
function initVoices() {
  const loadVoices = () => {
    const voices = speechSynthesis.getVoices();
    voiceSelect.innerHTML = '';
    // Prefer Korean voices
    const sorted = [...voices].sort((a, b) => {
      const aKo = a.lang.startsWith('ko') ? 0 : 1;
      const bKo = b.lang.startsWith('ko') ? 0 : 1;
      return aKo - bKo;
    });
    sorted.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      opt.dataset.voiceName = v.name;
      opt.dataset.voiceLang = v.lang;
      voiceSelect.appendChild(opt);
    });
  };
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

// ── Visualizer ──
function initVisualizer() {
  for (let i = 0; i < 24; i++) {
    const bar = document.createElement('div');
    bar.className = 'viz-bar';
    bar.style.animationDelay = `${Math.random() * 0.8}s`;
    bar.style.animationDuration = `${0.5 + Math.random() * 0.6}s`;
    voiceVisualizer.appendChild(bar);
  }
}

// ── Speech Recognition ──
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micBtn.style.display = 'none';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏺️';
    voiceVisualizer.classList.add('active');
    statusText.textContent = '듣고 있어요...';
  };

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    textInput.value = transcript;
    sendBtn.disabled = !transcript.trim();

    if (event.results[event.results.length - 1].isFinal) {
      stopRecording();
      if (transcript.trim()) {
        setTimeout(() => sendMessage(transcript.trim()), 300);
      }
    }
  };

  recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    stopRecording();
    if (event.error === 'not-allowed') {
      statusText.textContent = '마이크 권한 필요';
    }
  };

  recognition.onend = () => {
    stopRecording();
  };
}

function startRecording() {
  if (!recognition || isRecording) return;
  // Stop any current speech
  if (isSpeaking) stopSpeech();

  recognition.lang = $('langSelect').value;
  try {
    recognition.start();
  } catch(e) {
    console.log('Recognition already started');
  }
}

function stopRecording() {
  isRecording = false;
  micBtn.classList.remove('recording');
  micBtn.textContent = '🎤';
  voiceVisualizer.classList.remove('active');
  statusText.textContent = '준비 완료';
  try { recognition?.stop(); } catch(e) {}
}

// Mic button
micBtn.addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});

// Space key hold to record
let spaceHeld = false;
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement !== textInput && !spaceHeld) {
    e.preventDefault();
    spaceHeld = true;
    startRecording();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' && spaceHeld) {
    spaceHeld = false;
    if (isRecording) stopRecording();
  }
});

// ── TTS ──
function speak(text) {
  // Clean markdown/special chars for speech
  const cleanText = text
    .replace(/\*\*/g, '')
    .replace(/\*/g, '')
    .replace(/#{1,6}\s/g, '')
    .replace(/```[\s\S]*?```/g, '코드 블록')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/\n{2,}/g, '. ')
    .replace(/\n/g, '. ');

  const utterance = new SpeechSynthesisUtterance(cleanText);
  const voices = speechSynthesis.getVoices();
  const selectedIdx = parseInt(voiceSelect.value);
  if (voices[selectedIdx]) {
    utterance.voice = voices[selectedIdx];
  }
  utterance.rate = parseFloat($('speechRate').value);
  utterance.pitch = parseFloat($('speechPitch').value);
  utterance.lang = $('langSelect').value;

  utterance.onstart = () => {
    isSpeaking = true;
    stopSpeechBtn.classList.add('active');
    statusText.textContent = '말하고 있어요...';
  };
  utterance.onend = () => {
    isSpeaking = false;
    stopSpeechBtn.classList.remove('active');
    statusText.textContent = '준비 완료';
    currentUtterance = null;
  };
  utterance.onerror = () => {
    isSpeaking = false;
    stopSpeechBtn.classList.remove('active');
    statusText.textContent = '준비 완료';
  };

  currentUtterance = utterance;
  speechSynthesis.speak(utterance);
}

function stopSpeech() {
  speechSynthesis.cancel();
  isSpeaking = false;
  stopSpeechBtn.classList.remove('active');
  statusText.textContent = '준비 완료';
}

stopSpeechBtn.addEventListener('click', stopSpeech);

// ── Chat Messages ──
function addMessage(text, role) {
  welcomeScreen.style.display = 'none';
  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'ai' ? '🤖' : '👤'}</div>
    <div>
      <div class="msg-content">${formatMessage(text)}</div>
      <div class="msg-time">${time}</div>
    </div>
  `;

  // Insert before typing indicator
  chatContainer.insertBefore(div, typingIndicator);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function formatMessage(text) {
  return text
    .replace(/```([\s\S]*?)```/g, '<pre style="background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0;font-family:JetBrains Mono,monospace;font-size:12px;">$1</pre>')
    .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:12px;">$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

// ── Send Message ──
async function sendMessage(text) {
  if (!text?.trim()) return;
  if (!API_KEY) {
    apiModal.classList.add('active');
    return;
  }

  const userMessage = text.trim();
  textInput.value = '';
  sendBtn.disabled = true;
  addMessage(userMessage, 'user');

  conversationHistory.push({ role: 'user', content: userMessage });

  // Show typing
  typingIndicator.classList.add('active');
  statusText.textContent = 'AI가 생각 중...';
  chatContainer.scrollTop = chatContainer.scrollHeight;

  try {
    // Gemini API: conversationHistory를 Gemini 형식으로 변환
    const geminiHistory = conversationHistory.slice(-20).map(msg => ({
      role: msg.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: msg.content }]
    }));

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        system_instruction: {
          parts: [{ text: `당신은 친절하고 도움이 되는 한국어 AI 음성 비서입니다. 
사용자와 음성으로 대화하고 있으므로:
- 답변을 간결하고 자연스럽게 해주세요 (2-4문장 권장)
- 음성으로 읽기 좋은 자연스러운 구어체를 사용하세요
- 복잡한 마크다운이나 코드보다는 설명 위주로 답변하세요
- 한국어로 답변하되, 필요하면 다른 언어도 사용하세요` }]
        },
        contents: geminiHistory,
        generationConfig: {
          maxOutputTokens: 1024,
          temperature: 0.8
        }
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API 오류 (${response.status})`);
    }

    const data = await response.json();
    const aiText = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '응답을 받지 못했습니다.';

    conversationHistory.push({ role: 'assistant', content: aiText });
    typingIndicator.classList.remove('active');
    addMessage(aiText, 'ai');
    speak(aiText);

  } catch (error) {
    typingIndicator.classList.remove('active');
    console.error('API Error:', error);
    
    let errorMsg = '죄송합니다, 오류가 발생했어요.';
    if (error.message.includes('400') || error.message.includes('API_KEY_INVALID') || error.message.includes('401')) {
      errorMsg = 'API 키가 유효하지 않습니다. 설정에서 확인해주세요.';
      API_KEY = '';
      sessionStorage.removeItem('gemini_key');
      setTimeout(() => apiModal.classList.add('active'), 1500);
    } else if (error.message.includes('429') || error.message.includes('RESOURCE_EXHAUSTED')) {
      errorMsg = '요청이 너무 많습니다. 잠시 후 다시 시도해주세요.';
    } else if (error.message) {
      errorMsg = `오류: ${error.message}`;
    }
    addMessage(errorMsg, 'ai');
    speak(errorMsg);
  }

  statusText.textContent = '준비 완료';
}

// ── Input Handlers ──
textInput.addEventListener('input', () => {
  sendBtn.disabled = !textInput.value.trim();
});

textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && textInput.value.trim()) {
    e.preventDefault();
    sendMessage(textInput.value);
  }
});

sendBtn.addEventListener('click', () => {
  if (textInput.value.trim()) {
    sendMessage(textInput.value);
  }
});

function sendQuick(text) {
  sendMessage(text);
}
</script>
